project_name: nomad_simple
run_name: nomad_simple

# training setup
use_wandb: False  # 처음에는 wandb 없이 시작
train: True
batch_size: 64  # RTX 3080 메모리에 맞게 조정
epochs: 50  # 빠른 테스트를 위해 줄임
gpu_ids: [0]
num_workers: 8
lr: 1e-4
optimizer: adamw
clipping: False
max_norm: 1.
scheduler: "cosine"
warmup: True 
warmup_epochs: 2
cyclic_period: 10
plateau_patience: 3
plateau_factor: 0.5
seed: 0

# model params
model_type: nomad
vision_encoder: nomad_vint
encoding_size: 256
obs_encoder: efficientnet-b0
attn_unet: False
cond_predict_scale: False
mha_num_attention_heads: 4
mha_num_attention_layers: 4
mha_ff_dim_factor: 4
down_dims: [64, 128, 256]

# diffusion model params
num_diffusion_iters: 10

# mask 
goal_mask_prob: 0.5

# normalization for the action space
normalize: True

# context
context_type: temporal
context_size: 3
alpha: 1e-4

# distance bounds for distance and action and distance predictions 
distance:
  min_dist_cat: 0
  max_dist_cat: 20
action:
  min_dist_cat: 3
  max_dist_cat: 20

# action output params
len_traj_pred: 8
learn_angle: False

# dataset specific parameters
image_size: [96, 96] # width, height

# 간단한 테스트용 데이터셋 (하나만 사용)
datasets:
  recon:
    data_folder: /path/to/your/nomad_dataset/recon  # 실제 데이터 경로로 변경
    train: /path/to/your/data_splits/recon/train/   # 실제 데이터 경로로 변경
    test: /path/to/your/data_splits/recon/test/     # 실제 데이터 경로로 변경
    end_slack: 3
    goals_per_obs: 1
    negative_mining: True

# logging stuff
print_log_freq: 50  # 더 자주 로그 출력
image_log_freq: 500
num_images_log: 4
pairwise_test_freq: 0
eval_fraction: 0.25
wandb_log_freq: 10
eval_freq: 1 