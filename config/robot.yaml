# linear and angular speed limits for the robot
max_v: 1.33 # m/s
max_w: 5.0 # rad/s
# observation rate fo the robot
frame_rate: 6 # Hz
graph_rate: 0.3333 # Hz

# topic names (modify for different robots/nodes)
vel_teleop_topic: /cmd_vel_mux/input/teleop
vel_navi_topic: /cmd_vel
vel_recovery_topic: /cmd_vel_mux/input/recovery

wheel_radius: 0.069          # [m] 실제 측정값
wheel_separation: 0.26       # [m] 실제 측정값
gear_ratio: 1.0              # 감속기 없으면 1.0
uart_port: "/dev/ttyUSB0"    # Jetson에서 확인
uart_baud: 115200

left_motor_index: 0
right_motor_index: 1
invert_left: false           # 양수=전진이면 false
invert_right: false

motor_max_turns: 20.0        # 모터축 [turn/s]
watchdog_timeout: 0.5        # [s] /cmd_vel 끊기면 자동 정지


