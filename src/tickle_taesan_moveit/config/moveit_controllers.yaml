# 실제 컨트롤러 관리자 설정 (하드웨어용)
moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - right_arm_gripper_group_controller
    - left_arm_gripper_group_controller
  
  check_for_controllers: true

  right_arm_gripper_group_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - joint_r2
      - joint_r3
      - joint_r4
      - joint_r5
      - joint_r6
      - joint_r7r

  left_arm_gripper_group_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - joint_l2
      - joint_l3
      - joint_l4
      - joint_l5
      - joint_l6
      - joint_l7l
