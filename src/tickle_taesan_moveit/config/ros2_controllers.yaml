# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    right_arm_gripper_group_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    left_arm_gripper_group_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

right_arm_gripper_group_controller:
  ros__parameters:
    joints:
      - joint_r2
      - joint_r3
      - joint_r4
      - joint_r5
      - joint_r6
      - joint_r7r
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

left_arm_gripper_group_controller:
  ros__parameters:
    joints:
      - joint_l2
      - joint_l3
      - joint_l4
      - joint_l5
      - joint_l6
      - joint_l7l
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity